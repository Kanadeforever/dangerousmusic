; LocalMusic——发行版用户配置
; 请把本文件与 LocalMusic.asi 一起放在 DangerousDriving\Binaries\Win64\scripts。
; 未显示的播放、认证、Hook、专辑、封面、预加载和高 DPI 选项使用稳定内置值。
; 修改普通配置后需要重新启动游戏；PlayMode 与通知布局可在游戏内修改并自动保存。
;
; 游戏内通知布局调整：
; 手柄：按住 BACK + 十字键移动；BACK + LB + 上/下调整大小；
;       BACK + LB + 左/右调整透明度；BACK + R3 重置布局。
; 键盘：Ctrl + -/= 调整 Y；Shift + -/= 调整 X；Alt + -/= 调整大小；
;       直接按 -/= 调整透明度；Backspace 重置布局。

[LocalMusic]
; 运行语言：auto=按 Windows UI 语言；也可填写 zh-hans、en-us 或用户自建语言标签。
; 语言文件必须与 DLL 主文件名对应，例如 LocalMusic.zh-hans.ini、LocalMusic.en-us.ini。
Language=auto

; 是否写入 LocalMusic.log。false 时不创建、不截断、也不追加日志文件。
EnableLogging=true

; 音乐目录。相对路径以 DangerousDriving\Binaries\Win64 为基准。
MusicPath=..\..\Content\Music

; 播放模式：Sequential=顺序；Random=全曲库会话乱序；SingleLoop=单曲循环。
PlayMode=Sequential

; 插件永久音量倍率。最终音量 = Volume × 游戏内持久 Spotify 音量。
; 支持 0.0-1.0，也兼容 0-100。
Volume=0.5

; 曲目信息、暂停和继续播放通知。
ShowNowPlayingNotification=true
ShowPauseNotification=true
ShowResumeNotification=true

; 换曲通知保持时间，单位毫秒，不含淡入淡出。
NotificationDurationMs=3000

; 通知整体大小和背景不透明度，单位百分比；游戏内调整会写回这两个值。
NotificationScalePercent=100
NotificationOpacityPercent=92

; 通知锚点：TopLeft、TopRight、BottomLeft、BottomRight。
NotificationPosition=TopRight

; 从锚点向游戏画面内部移动的水平/垂直距离，单位物理像素；
; 游戏内移动通知时会写回这两个值。
NotificationMarginX=32
NotificationMarginY=32

; -----------------------------------------------------------------------------
; English reference (comments only; the active settings are above)
; -----------------------------------------------------------------------------
; LocalMusic — release user configuration
; Place this file next to LocalMusic.asi in DangerousDriving\Binaries\Win64\scripts.
; Playback, authentication, hooks, albums, artwork, preloading and high-DPI
; options not shown here use stable built-in defaults.
; Restart the game after changing normal settings. PlayMode and notification
; layout can also be changed in game and are saved automatically.
;
; In-game notification layout controls:
; Controller: hold BACK + D-pad to move; BACK + LB + Up/Down to resize;
;             BACK + LB + Left/Right to change opacity; BACK + R3 to reset.
; Keyboard: Ctrl + -/= changes Y; Shift + -/= changes X; Alt + -/= resizes;
;           plain -/= changes opacity; Backspace resets the layout.
;
; [LocalMusic]
; Language=auto                      Runtime language; auto follows Windows UI language.
;                                    Language files use names such as LocalMusic.en-us.ini.
; EnableLogging=true                 Write LocalMusic.log; false disables all file logging.
; MusicPath=..\..\Content\Music      Music directory, relative to Binaries\Win64.
; PlayMode=Sequential                Sequential, Random, or SingleLoop.
; Volume=0.5                         Permanent plugin volume multiplier.
; ShowNowPlayingNotification=true    Show track, album and current-status notices.
; ShowPauseNotification=true         Show a notice when the game calls Spotify Pause.
; ShowResumeNotification=true        Show a notice when playback resumes.
; NotificationDurationMs=3000        Track-notice hold time in milliseconds.
; NotificationScalePercent=100       Overall notice size; in-game changes are saved.
; NotificationOpacityPercent=92      Panel opacity; in-game changes are saved.
; NotificationPosition=TopRight      TopLeft, TopRight, BottomLeft, or BottomRight.
; NotificationMarginX=32             Horizontal inward offset in physical pixels.
; NotificationMarginY=32             Vertical inward offset in physical pixels.
