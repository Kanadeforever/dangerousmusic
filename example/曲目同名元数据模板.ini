; 将本文件复制到音频旁边，并改成与音频相同的主文件名。
; 示例：01 - Song.wav 对应 01 - Song.ini。
[Track]
Title=
Artist=
Album=
AlbumArtist=
TrackNumber=
DiscNumber=
Year=
Genre=

; false=只补充内嵌标签缺失字段；true=本曲强制使用这里的非空字段。
OverrideEmbeddedMetadata=false

; 可选。留空时自动查找与音频同名的 PNG/JPG/JPEG/BMP。
Cover=

; -----------------------------------------------------------------------------
; English reference (comments only)
; -----------------------------------------------------------------------------
; Copy this file next to an audio file and rename it to the same base name.
; Example: 01 - Song.wav uses 01 - Song.ini.
; [Track]
; Title=             Track title.
; Artist=            Track artist.
; Album=             Album title.
; AlbumArtist=       Album artist.
; TrackNumber=       Optional display metadata; playback order still follows the filename.
; DiscNumber=        Optional display metadata; it does not affect playback order.
; Year=              Release year.
; Genre=             Genre.
; OverrideEmbeddedMetadata=false  false fills only missing embedded fields;
;                                 true lets non-empty sidecar fields override them.
; Cover=             Optional explicit artwork path; when empty, a same-name
;                    PNG/JPG/JPEG/BMP image is searched automatically.
