; 将本文件复制到专辑文件夹并重命名为 album.ini。
[Album]
Title=
Artist=
AlbumArtist=
Year=
Genre=
DiscNumber=

; 可选。留空时自动查找 cover.*、folder.*、front.*。
Cover=

; -----------------------------------------------------------------------------
; English reference (comments only)
; -----------------------------------------------------------------------------
; Copy this file into an album folder and rename it to album.ini.
; [Album]
; Title=             Album title.
; Artist=            Primary album artist.
; AlbumArtist=       Album-artist field used to fill missing track metadata.
; Year=              Release year.
; Genre=             Genre.
; DiscNumber=        Optional display metadata; folder and filename order remain authoritative.
; Cover=             Optional explicit artwork path; when empty, cover.*, folder.*,
;                    and front.* are searched automatically.
