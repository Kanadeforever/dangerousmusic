[Config]
Header=LocalMusic——发行版用户配置
PlaceFile=请把本文件与 {0} 一起放在 DangerousDriving\\Binaries\\Win64。
HiddenOptions=未显示的播放、认证、Hook、专辑、封面、预加载和高 DPI 选项使用稳定内置值。
Restart=修改普通配置后需要重新启动游戏；PlayMode 与通知布局可在游戏内修改并自动保存。
LayoutHeader=游戏内通知布局调整：
Controller1=手柄：按住 BACK + 十字键移动；BACK + LB + 上/下调整大小；
Controller2=      BACK + LB + 左/右调整透明度；BACK + R3 重置布局。
Keyboard1=键盘：Ctrl + -/= 调整 Y；Shift + -/= 调整 X；Alt + -/= 调整大小；
Keyboard2=      直接按 -/= 调整透明度；Backspace 重置布局。
Language=运行语言：auto=按 Windows UI 语言；也可填写 zh-hans、en-us 或用户自建语言标签。
Logging=是否写入 {0}。false 时不创建、不截断、也不追加日志文件。
MusicPath=音乐目录。相对路径以 DangerousDriving\\Binaries\\Win64 为基准。
PlayMode=播放模式：Sequential=顺序；Random=全曲库会话乱序；SingleLoop=单曲循环。
Volume1=插件永久音量倍率。最终音量 = Volume × 游戏内持久 Spotify 音量。
Volume2=支持 0.0-1.0，也兼容 0-100。
Notifications=曲目信息、暂停和继续播放通知。
Duration=换曲通知保持时间，单位毫秒，不含淡入淡出。
ScaleOpacity=通知整体大小和背景不透明度，单位百分比；游戏内调整会写回这两个值。
Position=通知锚点：TopLeft、TopRight、BottomLeft、BottomRight。
Margin1=从锚点向游戏画面内部移动的水平/垂直距离，单位物理像素；
Margin2=游戏内移动通知时会写回这两个值。

