; 开发者高级配置参考（本文件不会被插件自动读取）
; 正式运行配置必须仍叫 dsound.ini。
; 仅在调试未来 EXE、Hook 或兼容性问题时，把所需键手工复制到 dsound.ini。
; 普通用户不要整份替换发行版的精简 dsound.ini。

; LocalMusic：曲目信息通知、无缝切歌、双层持久音量
; 请把本文件与 dsound.dll 一起放在 DangerousDriving\Binaries\Win64 目录。
; DLL 不会自动覆盖已经存在的 dsound.ini。

[LocalMusic]
; 运行语言。auto 根据 Windows UI 语言选择 zh-hans/en-us；也可使用自建小写语言标签。
Language=auto

; 日志总开关。false 时不创建、不截断、也不追加 dsound.log。
EnableLogging=true
; 相对路径以 DangerousDriving\Binaries\Win64 为基准。
MusicPath=..\..\Content\Music
; 是否扫描音乐目录的子目录。
ScanSubdirs=true
; 每个实际包含音乐文件的目录视为一张专辑；根目录散装曲目归入“未分类曲目”。
EnableFolderAlbums=true
; 是否读取与音频同主文件名的侧挂 INI，例如 Song.wav 对应 Song.ini。
EnableSidecarMetadata=true
; false=侧挂 INI 只补缺；true=全局允许侧挂 INI 覆盖有效内嵌标签。
SidecarMetadataOverride=false
; 支持的文件扩展名，使用英文逗号分隔。
SupportedFormats=mp3,wav,ogg
; 播放模式：Sequential=顺序；Random=全曲库会话乱序队列；SingleLoop=单曲循环。
; Random 只在进入模式/重新扫描时生成队列，上一曲和下一曲按该队列移动。
PlayMode=Sequential
; 插件侧永久音量倍率，支持 0.0-1.0 或 0-100。
; GameSpotify 模式最终公式：FMOD = Volume × 游戏持久 Spotify 音量。
; 示例：Volume=0.20、游戏=100% 时最终为 20%；游戏每次 5% 步进会改变最终音量 1%。
Volume=0.5
; 旧版兼容选项。启用游戏集成后仍会等待游戏发出播放信号。
StartPaused=false
; 默认关闭全局多媒体键，避免菜单、退出确认和系统媒体键误控制音乐。
EnableHotkeys=false
; 启用固定专辑控制：Insert=上一专辑、PageUp=下一专辑、Home=切换模式；
; 手柄为 LB+左/右/下/上。固定按键不提供重映射。
EnableAlbumControls=true
; 是否允许暂停控制。
AllowPause=true
; 是否允许上一曲/下一曲控制。
AllowSkip=true
; 是否安装游戏接口 Hook。
EnableGameHooks=true
; 默认向游戏暴露本地 Spotify 后端。
; 插件不实现 Spotify 账号界面，只提供本地播放。
; 仅在希望保留 DLL 但临时关闭后端时设为 false。
LocalSpotifyReplacementEnabled=true
; 是否把后端启用状态写入插件自己的 INI；不会写入游戏存档。
RememberSpotifyModeInPluginIni=true
; 跟随游戏原有 Spotify 播放控制。
StartLocalMusicOnPlay=true
StartLocalMusicOnUnpause=true
; 游戏只可靠提供单一 Pause 路径时，允许 Pause 在已暂停状态下恢复播放。
PauseTogglesPlayback=true
; 本地后端尚未激活时忽略游戏换曲调用。
RespondToSkipOnlyWhenActive=true
; 实验性：尝试忽略与菜单横向导航同时发生的 NextTrack/PreviousTrack 调用。
; 已知限制：部分 UI 会延迟到另一帧调用换曲，因此此功能不能保证完全阻止菜单左右键误切歌。
SuppressNavigationKeySkips=false
; 横向导航后抑制游戏换曲调用的时间窗口，单位毫秒。
NavigationSkipSuppressionMs=400
; 是否在歌曲自然结束后自动切换。
AutoAdvance=true
; 当前歌曲播放时预先打开计划中的下一首流，减少自然切歌等待。
PreloadNextTrack=true
; 游戏持久音量向上变化必须稳定此时长后才应用，单位毫秒。
; 降低音量仍立即生效。设为 0 可关闭此保护。
GameVolumeIncreaseDebounceMs=250
; 游戏第一次发布持久 Spotify 音量时自动开始本地播放。
StartLocalMusicOnGameVolume=true
; 仅在内存中绕过认证；不修改 SaveGame.sav 和 Visited Links。
BypassSpotifyAuthentication=true
; Immediate=立即回调，避免加载/验证阶段长时间等待；Deferred=延迟到安全游戏线程入口。
AuthenticationCallbackMode=Immediate
; 是否输出更详细的认证回调日志。
VerboseAuthCallbacks=false
; GameSpotify：FMOD = 插件 Volume × 游戏持久 Spotify 音量。
; 关卡/菜单的临时 SetVolumeOffset 不参与计算。
; Plugin：忽略全部游戏音量调用，只使用 Volume。
; HookGameVolume 只观察运行时音量，不保存游戏音量。
VolumeSource=GameSpotify
HookGameVolume=true
; 没有找到可播放曲目时是否弹出一次启动提示。
ShowEmptyLibraryWarning=true

; 是否显示插件自绘的当前曲目信息通知。
ShowNowPlayingNotification=true
; 是否在收到真实 Spotify Pause 调用时显示“已暂停”。
ShowPauseNotification=true
; 是否在恢复现有曲目时显示“继续播放”。
ShowResumeNotification=true
; 是否尝试读取 MP3 APIC、OGG METADATA_BLOCK_PICTURE/COVERART 内嵌封面。
ShowEmbeddedCover=true
; 是否使用同名图片、曲目 INI 指定图片和文件夹专辑封面。
ShowExternalCover=true
; 是否在正在播放/暂停/继续标题行附加当前播放模式。
ShowPlayModeInNotification=true
; 游戏不在前台时隐藏通知，避免弹窗覆盖桌面或其他程序。
NotificationOnlyWhenGameForeground=true
; 换曲提示保持时间，单位毫秒，不含淡入淡出。
NotificationDurationMs=3000
; 暂停/继续提示保持时间，单位毫秒。
NotificationStatusDurationMs=1800
; 淡入和淡出各自使用的时间，单位毫秒。
NotificationFadeMs=250
; 通知整体缩放百分比，建议 75-200。大小不跟随游戏分辨率或 Windows DPI 自动放大。
NotificationScalePercent=100
; 通知不透明度百分比，建议 40-100。
NotificationOpacityPercent=92
; 是否在启动早期请求进程级高 DPI 感知，并让通知线程使用 Per-Monitor V2。
; 启用后，通知尺寸和边距按物理像素计算，避免 Windows DPI 虚拟化改变组件大小。
EnableHighDpiAwareness=true
; 从所选角落向游戏客户区内部移动的水平距离，单位物理像素。
NotificationMarginX=32
; 从所选角落向游戏客户区内部移动的垂直距离，单位物理像素。
NotificationMarginY=32
; 位置：TopLeft、TopRight、BottomLeft、BottomRight。
NotificationPosition=TopRight

[Compatibility]
; true 时 EXE 时间戳、映像大小或 SHA 不匹配会禁用全部 Hook。
; false 时未知 EXE 仍必须通过全部动态地址和结构验证。
StrictVersion=false
; 任意必需 Hook 无法解析时是否整组停止。
RequireAllHooks=true
; 仅验证兼容性，不写入游戏内存。
DryRun=false
; 是否在运行时计算 EXE SHA-256，可能增加启动耗时。
CalculateSha256=false
; 用户提供的 2020 版 EXE 配置。
ExpectedTimestamp=0x5E569211
ExpectedImageSize=0x3383000
ExpectedSha256=847c4db36468531a1f527f14dbee36d464a36bc6cf7bcc02827f64b26c1a2014
; auto 表示从已定位的 UE4 exec 包装函数中推断 FFrame::Code 偏移。
FrameCodeOffset=auto
; UE4 动态多播委托广播函数的特征码和当前 EXE 备用 RVA。
DelegateBroadcastPattern=4C 8B DC 53 41 54 41 56 48 81 EC ?? ?? ?? ?? 48 8B 05 ?? ?? ?? ?? 48 33 C4
DelegateBroadcastRva=0x258250
; 当前 EXE 的 SpotifyService dispatcher/状态字段偏移。
EnabledDispatcherOffset=0x28
ActivateCodeDispatcherOffset=0x38
CheckAuthCodeDispatcherOffset=0x48
RefreshAccessTokenDispatcherOffset=0x58
SwitchActiveDeviceDispatcherOffset=0x68
ServiceEnabledOffset=0x9C

; 自动注册表解析失败时，可为未来 EXE 填写字节特征码。
[Patterns]

; 对应 [Patterns] 命中地址的附加偏移。
[PatternOffsets]

; 最后的固定 RVA 备用方案。只有通过包装函数结构验证后才会使用。
[RVA]

; -----------------------------------------------------------------------------
; English reference (comments only; this file is not loaded automatically)
; -----------------------------------------------------------------------------
; Developer advanced configuration reference.
; The actual runtime file must still be named dsound.ini.
; Copy only the required keys into the real dsound.ini while diagnosing a future
; executable, hook resolution, or compatibility issue. Regular users should not
; replace the simplified release configuration with this whole file.
;
; [LocalMusic]
; Language=auto                       Runtime language; custom files use <dllstem>.<tag>.ini.
; EnableLogging=true                  Master dsound.log switch.
; MusicPath=..\..\Content\Music     Music directory relative to Binaries\Win64.
; ScanSubdirs=true                    Recursively scan child directories.
; EnableFolderAlbums=true             Treat each directory containing music as an album.
; EnableSidecarMetadata=true          Read Song.ini next to Song.wav/mp3/ogg.
; SidecarMetadataOverride=false       Sidecars fill missing fields unless override is enabled.
; SupportedFormats=mp3,wav,ogg        Comma-separated supported extensions.
; PlayMode=Sequential                 Sequential, Random session queue, or SingleLoop.
; Volume=0.5                          Permanent plugin volume multiplier.
; StartPaused=false                   Legacy fallback; game integration still starts idle.
; EnableHotkeys=false                 Optional global media keys, disabled by default.
; EnableAlbumControls=true            Fixed Insert/PageUp/Home and LB+D-pad controls.
;                                      Also enables BACK/Backspace notification layout controls.
; AllowPause=true                     Allow local pause handling.
; AllowSkip=true                      Allow local previous/next handling.
; EnableGameHooks=true                Install the game's Spotify interface hooks.
; LocalSpotifyReplacementEnabled=true Expose the local replacement backend to the game.
; RememberSpotifyModeInPluginIni=true Persist only the plugin backend-enabled state.
; StartLocalMusicOnPlay=true          Follow the game's Play request.
; StartLocalMusicOnUnpause=true       Follow the game's Unpause request.
; PauseTogglesPlayback=true           Let repeated Pause toggle when required by the game path.
; RespondToSkipOnlyWhenActive=true    Ignore game skips before the local session is active.
; SuppressNavigationKeySkips=false    Experimental and unreliable horizontal-menu suppression.
; NavigationSkipSuppressionMs=400     Experimental suppression window.
; AutoAdvance=true                    Advance when the current track ends.
; PreloadNextTrack=true               Open the planned next stream in advance.
; GameVolumeIncreaseDebounceMs=250    Debounce upward game-volume reports; decreases are immediate.
; StartLocalMusicOnGameVolume=true    Start when persistent game Spotify volume is first published.
; BypassSpotifyAuthentication=true    Simulate authentication only in memory.
; AuthenticationCallbackMode=Immediate Immediate or Deferred callback delivery.
; VerboseAuthCallbacks=false          Extra authentication callback logging.
; VolumeSource=GameSpotify            Plugin Volume × persistent game Spotify volume.
; HookGameVolume=true                 Observe persistent game volume without saving it.
; ShowEmptyLibraryWarning=true        Show one warning when no playable tracks are found.
; ShowNowPlayingNotification=true     Show track, album, and status notices.
; ShowPauseNotification=true          Show a notice on a real Spotify Pause call.
; ShowResumeNotification=true         Show a notice when the current track resumes.
; ShowEmbeddedCover=true              Read MP3/OGG embedded artwork.
; ShowExternalCover=true              Read same-name and folder artwork.
; ShowPlayModeInNotification=true     Append the current mode to status text.
; NotificationOnlyWhenGameForeground=true Hide notices while another app is foreground.
; NotificationDurationMs=3000         Track/album notice hold time.
; NotificationStatusDurationMs=1800   Pause/resume/mode/layout status hold time.
; NotificationFadeMs=250              Fade-in and fade-out duration.
; NotificationScalePercent=100        Fixed physical-pixel scale, 50-200.
; NotificationOpacityPercent=92       Panel opacity, 40-100.
; EnableHighDpiAwareness=true         Request Per-Monitor V2 for physical-pixel layout.
; NotificationMarginX=32              Horizontal inward offset from the anchor.
; NotificationMarginY=32              Vertical inward offset from the anchor.
; NotificationPosition=TopRight       TopLeft, TopRight, BottomLeft, or BottomRight.
;
; Fixed in-game layout controls have no remapping keys:
; - Controller: hold BACK + D-pad to move; BACK+LB+Up/Down changes size;
;   BACK+LB+Left/Right changes opacity; BACK+R3 resets.
; - Keyboard: Ctrl+-/= changes Y; Shift+-/= changes X; Alt+-/= changes size;
;   plain -/= changes opacity; Backspace resets.
;
; [Compatibility]
; StrictVersion=false                 Require the exact timestamp/image/SHA profile when true.
; RequireAllHooks=true                Roll back the entire group if a required hook fails.
; DryRun=false                        Validate addresses without writing game memory.
; CalculateSha256=false               Calculate the executable SHA-256 at runtime.
; ExpectedTimestamp=0x5E569211        Profile for the supplied 2020 executable.
; ExpectedImageSize=0x3383000
; ExpectedSha256=847c4db36468531a1f527f14dbee36d464a36bc6cf7bcc02827f64b26c1a2014
; FrameCodeOffset=auto                 Infer FFrame::Code from a resolved exec wrapper.
; DelegateBroadcastPattern=...        UE4 multicast delegate broadcast signature.
; DelegateBroadcastRva=0x258250       Fallback RVA for the current executable.
; EnabledDispatcherOffset=0x28        SpotifyService dispatcher/state offsets.
; ActivateCodeDispatcherOffset=0x38
; CheckAuthCodeDispatcherOffset=0x48
; RefreshAccessTokenDispatcherOffset=0x58
; SwitchActiveDeviceDispatcherOffset=0x68
; ServiceEnabledOffset=0x9C
;
; [Patterns]                          Optional future-executable byte patterns.
; [PatternOffsets]                    Additional offsets applied to pattern hits.
; [RVA]                               Final fixed-RVA fallback after wrapper validation.
